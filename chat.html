<script>
// Stockage local
let data = {};

// Charger les infos
fetch("data/info.json")
    .then(res => res.json())
    .then(json => { data = json });

// DICTIONNAIRE D’INTENTIONS (super important)
const intents = {
    "email": () => data.identité.email,
    "mail": () => data.identité.email,
    "contact": () => data.identité.email,

    "linkedin": () => data.identité.linkedin,
    "github": () => data.identité.github,

    "nom": () => data.identité.nom,
    "qui es tu": () => 
        `Je suis ${data.identité.nom}, élève ingénieur en mécatronique à l’ENSAM Casablanca.`,

    "formation": () => 
        `${data.formation.ecole}, ${data.formation.filiere} (${data.formation.annees})`,

    "projets": () => Object.values(data.projets).join("<br><br>"),

    "certifications": () => Object.values(data.certifications).join("<br>"),

    "parascolaire": () => 
        `Technique : ${data.parascolaire.technique}<br>
        Humanitaire : ${data.parascolaire.humanitaire}`
};

// Fonction principale

    question = question.toLowerCase();

    // 1) Vérifier une intention connue
    for (let key in intents) {
        if (question.includes(key)) {

        }
    }

    // 2) Recherche intelligente dans les données
    let answer = "";
    for (let section in data) {
        for (let field in data[section]) {

}
</script>
