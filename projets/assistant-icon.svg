<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="g" x1="0" x2="1">
      <stop offset="0" stop-color="#0ea5e9"/>
      <stop offset="1" stop-color="#0369a1"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="10" fill="url(#g)"/>
  <!-- gear outline -->
  <g transform="translate(32,32) scale(0.9)">
    <path d="M0-14 L3-18 L9-17 L11-21 L6-24 L8-30 L0-28 L-8-30 L-6-24 L-11-21 L-9-17 L-3-18 Z" fill="#ffffff" opacity="0.12" transform="scale(0.7) translate(0,6)"/>
    <circle r="10" fill="#fff" opacity="0.95"/>
    <!-- small propeller (drone hint) -->
    <g fill="#0ea5e9" transform="translate(-1,0)">
      <ellipse rx="6" ry="2.2" transform="rotate(0) translate(6,0)"/>
      <ellipse rx="6" ry="2.2" transform="rotate(90) translate(0,6)"/>
      <ellipse rx="6" ry="2.2" transform="rotate(45) translate(4.2,1.2)"/>
      <circle r="1.6" fill="#0369a1"/>
    </g>
    <!-- chat bubble tail to represent assistant -->
    <path d="M10 8 L14 12 L10 12 Z" fill="#0ea5e9" transform="translate(-6,6)"/>
  </g>
</svg>